name: oneuptime

volumes:
  postgres:
  clickhouse:

networks:
  oneuptime:

x-depends-on: &depends-on
  postgres:
    condition: service_healthy
  redis:
    condition: service_healthy
  clickhouse:
    condition: service_healthy

x-common-env: &common-env
  HOST: ${HOST}
  HTTP_PROTOCOL: ${HTTP_PROTOCOL}
  APP_PORT: ${APP_PORT}
  HOME_PORT: ${HOME_PORT}
  SERVER_APP_HOSTNAME: ${SERVER_APP_HOSTNAME}
  SERVER_HOME_HOSTNAME: ${SERVER_HOME_HOSTNAME}
  DISABLE_TELEMETRY: ${DISABLE_TELEMETRY}

services:
  fastapi:
    build: .
    restart: unless-stopped
    networks:
      - oneuptime
    ports:
      - "${FASTAPI_PORT}:${FASTAPI_PORT}"

  app:
    image: oneuptime/app:${APP_TAG}
    restart: unless-stopped
    depends_on: *depends-on
    networks:
      - oneuptime
    environment:
      <<: *common-env
      NODE_ENV: ${ENVIRONMENT}
      PORT: ${APP_PORT}
      DATABASE_HOST: ${DATABASE_HOST}
      DATABASE_PORT: ${DATABASE_PORT}
      DATABASE_NAME: ${DATABASE_NAME}
      DATABASE_USERNAME: ${DATABASE_USERNAME}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      CLICKHOUSE_HOST: ${CLICKHOUSE_HOST}
      CLICKHOUSE_PORT: ${CLICKHOUSE_PORT}
      CLICKHOUSE_DATABASE: ${CLICKHOUSE_DATABASE}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      REDIS_USERNAME: ${REDIS_USERNAME}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      ONEUPTIME_SECRET: ${ONEUPTIME_SECRET}
      ENCRYPTION_SECRET: ${ENCRYPTION_SECRET}
      REGISTER_PROBE_KEY: ${REGISTER_PROBE_KEY}
      BILLING_ENABLED: ${BILLING_ENABLED}
      IS_ENTERPRISE_EDITION: ${IS_ENTERPRISE_EDITION}
      CAPTCHA_ENABLED: ${CAPTCHA_ENABLED}

  probe-1:
    image: oneuptime/probe:${APP_TAG}
    restart: unless-stopped
    network_mode: host
    environment:
      ONEUPTIME_URL: ${GLOBAL_PROBE_1_ONEUPTIME_URL}
      PROBE_NAME: ${GLOBAL_PROBE_1_NAME}
      PROBE_KEY: ${GLOBAL_PROBE_1_KEY}
      REGISTER_PROBE_KEY: ${REGISTER_PROBE_KEY}
      PORT: ${GLOBAL_PROBE_1_PORT}
      DISABLE_TELEMETRY: ${DISABLE_TELEMETRY}

  ingress:
    image: oneuptime/nginx:${APP_TAG}
    restart: unless-stopped
    depends_on: *depends-on
    networks:
      - oneuptime
    ports:
      - "${ONEUPTIME_HTTP_PORT}:7849"
    environment:
      <<: *common-env
      ONEUPTIME_HTTP_PORT: ${ONEUPTIME_HTTP_PORT}
      NGINX_LISTEN_ADDRESS: ${NGINX_LISTEN_ADDRESS}
      NGINX_LISTEN_OPTIONS: ${NGINX_LISTEN_OPTIONS}

  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    networks:
      - oneuptime
    volumes:
      - postgres:/var/lib/postgresql
    environment:
      POSTGRES_DB: ${DATABASE_NAME}
      POSTGRES_USER: ${DATABASE_USERNAME}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready"]
      interval: 10s
      timeout: 5s
      retries: 5

  clickhouse:
    image: clickhouse/clickhouse-server:26.4
    restart: unless-stopped
    networks:
      - oneuptime
    volumes:
      - clickhouse:/var/lib/clickhouse
    environment:
      CLICKHOUSE_DB: ${CLICKHOUSE_DATABASE}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: ${CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT}
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --query 'SELECT 1'"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8.2-alpine
    restart: unless-stopped
    networks:
      - oneuptime
    command: redis-server --requirepass "${REDIS_PASSWORD}" --save "" --appendonly no
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
