apiVersion: 1

groups:
  - orgId: 1
    name: FastAPI Incident Alerts
    folder: Incidents
    interval: 1m
    rules:
      # Fires when /health stops returning HTTP 200 (probe_success drops to 0)
      - uid: fastapi-health-check
        title: "FastAPI Health Check Failed"
        condition: C
        for: 0s
        data:
          - refId: A
            datasourceUid: prometheus-ds
            relativeTimeRange:
              from: 300
              to: 0
            model:
              datasource:
                type: prometheus
                uid: prometheus-ds
              expr: 'probe_success{job="fastapi-health"}'
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: B
            datasourceUid: __expr__
            relativeTimeRange:
              from: 300
              to: 0
            model:
              datasource:
                type: __expr__
                uid: __expr__
              type: reduce
              expression: A
              reducer: last
              intervalMs: 1000
              maxDataPoints: 43200
              refId: B
          - refId: C
            datasourceUid: __expr__
            relativeTimeRange:
              from: 300
              to: 0
            model:
              datasource:
                type: __expr__
                uid: __expr__
              conditions:
                - evaluator:
                    params:
                      - 1
                    type: lt
                  operator:
                    type: and
                  query:
                    params:
                      - B
                  reducer:
                    params: []
                    type: last
                  type: query
              expression: B
              intervalMs: 1000
              maxDataPoints: 43200
              refId: C
              type: threshold
        noDataState: Alerting
        execErrState: Alerting
        annotations:
          summary: "FastAPI /health is DOWN"
          description: "The /health endpoint is not returning HTTP 200. Service may be degraded or unreachable."
        labels:
          severity: critical
          service: fastapi
        isPaused: false
